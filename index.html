<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Calculator</title>
		<link href="style.css" rel="stylesheet" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Noto+Sans+Math&family=Syne:wght@400..800&display=swap"
			rel="stylesheet"
		/>
		<script src="main.js" defer></script>
	</head>
	<body>
		<div class="container">
			<p>Calculator</p>
			<h3 class="pre-display">012345</h3>
			<h3 class="display">0123456789</h3>
			<div class="btns">
				<div class="row">
					<button type="button" class="operator" data-operator="percent">%</button>
					<button type="button" data-number="7">7</button>
					<button type="button" data-number="4">4</button>
					<button type="button" data-number="1">1</button>
					<button type="button" class="allClear" data-action="clear">AC</button>
				</div>
				<div class="row">
					<button type="button" class="operator" data-operator="divide">÷</button>
					<button type="button" data-number="8">8</button>
					<button type="button" data-number="5">5</button>
					<button type="button" data-number="2">2</button>
					<button type="button" data-number="0">0</button>
				</div>
				<div class="row">
					<button type="button" class="operator" data-operator="multiply">x</button>
					<button type="button" data-number="9">9</button>
					<button type="button" data-number="6">6</button>
					<button type="button" data-number="3">3</button>
					<button type="button" data-number="." class="decimal">.</button>
				</div>
				<div class="row">
					<button type="button" class="operator" data-action="delete">←</button>
					<button type="button" class="operator" data-operator="subtract">−</button>
					<button type="button" class="operator" data-operator="add">+</button>
					<button type="button" class="equalSign" data-action="equal">=</button>
				</div>
			</div>
		</div>
	</body>
</html>
